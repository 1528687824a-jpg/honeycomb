name: agent-openclaw

services:
  postgres:
    image: postgres:17-alpine
    container_name: agent-openclaw-postgres
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5432:5432"
    volumes:
      - postgres17-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 20

  orchestrator-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: agent-openclaw-orchestrator-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://temporal:temporal@postgres:5432/temporal
      DBOS_SYSTEM_DATABASE_URL: postgresql://temporal:temporal@postgres:5432/temporal
      DBOS_SYSTEM_DATABASE_SCHEMA: dbos
      ORCHESTRATOR_PORT: "3000"
      JOB_DATA_DIR: /app/data/jobs
      FEISHU_ADAPTER_ENABLED: "false"
      FEISHU_DRY_RUN: "true"
      OPENCLAW_AGENT_MODE: mock
      HONEYCOMB_SECRET_DIR: /app/honeycomb-secrets
      HONEYCOMB_OPENCLAW_RUNTIME_DIR: /app/honeycomb-runtime
      AGENT_CLUSTER_CONFIG_PATH: ${AGENT_CLUSTER_CONFIG_PATH:-}
      HONEYCOMB_AGENT_MODEL_CONFIG_PATH: ${HONEYCOMB_AGENT_MODEL_CONFIG_PATH:-}
      HONEYCOMB_FIRST_RUN_AGENTS_DIR: ${HONEYCOMB_FIRST_RUN_AGENTS_DIR:-}
      HONEYCOMB_PANEL_SUPERVISOR_AGENT_ID: ${HONEYCOMB_PANEL_SUPERVISOR_AGENT_ID:-panel-supervisor-agent}
    ports:
      - "3000:3000"
    volumes:
      - job-data:/app/data/jobs
      - ${HONEYCOMB_SECRET_HOST_DIR:-./.runtime/honeycomb-secrets}:/app/honeycomb-secrets
      - ${HONEYCOMB_OPENCLAW_RUNTIME_HOST_DIR:-./.runtime/honeycomb-empty}:/app/honeycomb-runtime
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  dbos-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: agent-openclaw-dbos-worker
    depends_on:
      orchestrator-api:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://temporal:temporal@postgres:5432/temporal
      DBOS_SYSTEM_DATABASE_URL: postgresql://temporal:temporal@postgres:5432/temporal
      DBOS_SYSTEM_DATABASE_SCHEMA: dbos
      JOB_DATA_DIR: /app/data/jobs
      FEISHU_ADAPTER_ENABLED: "false"
      FEISHU_DRY_RUN: "true"
      OPENCLAW_AGENT_MODE: mock
      HONEYCOMB_SECRET_DIR: /app/honeycomb-secrets
      HONEYCOMB_OPENCLAW_RUNTIME_DIR: /app/honeycomb-runtime
      AGENT_CLUSTER_CONFIG_PATH: ${AGENT_CLUSTER_CONFIG_PATH:-}
      HONEYCOMB_AGENT_MODEL_CONFIG_PATH: ${HONEYCOMB_AGENT_MODEL_CONFIG_PATH:-}
      HONEYCOMB_FIRST_RUN_AGENTS_DIR: ${HONEYCOMB_FIRST_RUN_AGENTS_DIR:-}
      HONEYCOMB_PANEL_SUPERVISOR_AGENT_ID: ${HONEYCOMB_PANEL_SUPERVISOR_AGENT_ID:-panel-supervisor-agent}
    volumes:
      - job-data:/app/data/jobs
      - ${HONEYCOMB_SECRET_HOST_DIR:-./.runtime/honeycomb-secrets}:/app/honeycomb-secrets
      - ${HONEYCOMB_OPENCLAW_RUNTIME_HOST_DIR:-./.runtime/honeycomb-empty}:/app/honeycomb-runtime

volumes:
  job-data:
  postgres17-data:
